# 1. Runtime Config for the Kubernetes Provider
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-90"
    name: kubernetes-config
spec:
    deploymentTemplate:
        spec:
            selector:
                matchLabels:
                    pkg.crossplane.io/provider: provider-kubernetes
            template:
                metadata:
                    labels:
                        pkg.crossplane.io/provider: provider-kubernetes
                spec:
                    containers:
                        -   name: package-runtime
                            resources:
                                limits:
                                    cpu: 1000m
                                    memory: 2Gi
                                requests:
                                    cpu: 250m
                                    memory: 512Mi
                    serviceAccountName: provider-kubernetes
    serviceAccountTemplate:
        metadata:
            name: provider-kubernetes

---

# 2. Runtime Config for GCP Cloud SQL Provider
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-90"
    name: gcp-sql-config
spec:
    deploymentTemplate:
        spec:
            selector:
                matchLabels:
                    pkg.crossplane.io/provider: provider-gcp-sql
            template:
                metadata:
                    labels:
                        pkg.crossplane.io/provider: provider-gcp-sql
                spec:
                    containers:
                        -   name: package-runtime
                            resources:
                                limits:
                                    cpu: 1000m
                                    memory: 2Gi
                                requests:
                                    cpu: 250m
                                    memory: 512Mi
                    serviceAccountName: provider-gcp-sql
    serviceAccountTemplate:
        metadata:
            annotations:
                iam.gke.io/gcp-service-account: {{ printf "%s-cp-iam@%s.iam.gserviceaccount.com" .Values.deploymentName .Values.gcp.projectId }}
            name: provider-gcp-sql

---

